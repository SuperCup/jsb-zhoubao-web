name: Deploy Test GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-test
  cancel-in-progress: false

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: PUBLIC_BASE_PATH=/jsb-zhoubao-web/ npm run build:public

      - name: Publish test gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          rm -rf /tmp/jsb-zhoubao-web-gh-pages
          git worktree add /tmp/jsb-zhoubao-web-gh-pages origin/gh-pages
          find /tmp/jsb-zhoubao-web-gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R public-dist/. /tmp/jsb-zhoubao-web-gh-pages/
          touch /tmp/jsb-zhoubao-web-gh-pages/.nojekyll
          git -C /tmp/jsb-zhoubao-web-gh-pages add -A
          git -C /tmp/jsb-zhoubao-web-gh-pages diff --cached --quiet || git -C /tmp/jsb-zhoubao-web-gh-pages commit -m "Deploy test GitHub Pages"
          git -C /tmp/jsb-zhoubao-web-gh-pages push origin HEAD:gh-pages
